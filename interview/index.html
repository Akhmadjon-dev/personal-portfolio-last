t("What is the <code>Image</code> component in detail?","<p>Props: <code>src</code>, <code>alt</code>, <code>width</code>/<code>height</code> or <code>fill</code>, <code>sizes</code>, <code>priority</code>, <code>placeholder=\"blur\"</code>, <code>quality</code>. Requires <code>remotePatterns</code> in config for external images.</p>","junior"),
t("API routes in depth?","<p>Pages Router: <code>export default function handler(req, res)</code>. App Router: named exports <code>GET</code>, <code>POST</code>, <code>PUT</code>, <code>DELETE</code> in <code>route.js</code>. Access headers, cookies, search params from the request.</p>","junior"),
t("What is <code>getStaticPaths</code>?","<p>Used with <code>getStaticProps</code> for dynamic routes to specify which paths to pre-render at build time.</p><pre><code>export async function getStaticPaths() {\n  const posts = await getPosts();\n  return {\n    paths: posts.map(p =&gt; ({ params: { slug: p.slug } })),\n    fallback: 'blocking' // or false, true\n  };\n}</code></pre>","junior"),
t("What is <code>useRouter</code>?","<pre><code>// Pages Router\nimport { useRouter } from 'next/router';\nconst router = useRouter();\nrouter.push('/about');\nrouter.query.slug;\n\n// App Router\nimport { useRouter } from 'next/navigation';\nconst router = useRouter();\nrouter.push('/about');\n// Use useParams(), useSearchParams() for params</code></pre>","junior"),
t("What is <code>loading.js</code>?","<p>App Router: automatically wraps the page in a Suspense boundary. Shows while the page's async data loads.</p><pre><code>// app/dashboard/loading.js\nexport default function Loading() {\n  return &lt;Spinner /&gt;;\n}</code></pre>","junior"),
t("What is <code>error.js</code>?","<p>App Router: error boundary for a route segment. Must be a Client Component.</p><pre><code>'use client';\nexport default function Error({ error, reset }) {\n  return &lt;div&gt;{error.message} &lt;button onClick={reset}&gt;Retry&lt;/button&gt;&lt;/div&gt;;\n}</code></pre>","junior"),
t("What is <code>layout.js</code>?","<p>Shared UI that wraps child routes. Persists across navigation (doesn't remount). Root layout is required and must include <code>&lt;html&gt;</code> and <code>&lt;body&gt;</code> tags.</p>","junior"),
t("How to use environment variables?","<p><code>.env.local</code> for secrets (server only). Prefix with <code>NEXT_PUBLIC_</code> to expose to browser. Access via <code>process.env.MY_VAR</code>.</p>","junior"),
t("What is dynamic import?","<pre><code>import dynamic from 'next/dynamic';\nconst Chart = dynamic(() =&gt; import('../components/Chart'), {\n  loading: () =&gt; &lt;Skeleton /&gt;,\n  ssr: false // client-only component\n});</code></pre>","junior"),

// MID (12)
t("Server Components vs Client Components?","<p>Server (default): render on server, zero bundle impact, direct DB access, no hooks/events. Client (<code>'use client'</code>): interactive, hooks, browser APIs. Keep client boundary as low as possible.</p>","mid"),
t("What are Server Actions?","<p>Async functions that run on the server, callable from client components. Marked with <code>'use server'</code>. Replace API routes for mutations.</p><pre><code>async function createPost(formData) {\n  'use server';\n  await db.posts.create({ data: { title: formData.get('title') } });\n  revalidatePath('/posts');\n}</code></pre>","mid"),
t("How does caching work in App Router?","<p>4 layers: Request Memoization (dedupe same URL), Data Cache (persistent), Full Route Cache (SSG), Router Cache (client-side). Invalidate with <code>revalidatePath</code>, <code>revalidateTag</code>, or <code>cache: 'no-store'</code>.</p>","mid"),
t("What are Parallel Routes?","<pre><code>// app/layout.js\nexport default function Layout({ children, analytics, team }) {\n  return (&lt;&gt;{children}{analytics}{team}&lt;/&gt;);\n}\n// app/@analytics/page.js\n// app/@team/page.js</code></pre><p>Render multiple pages in same layout simultaneously. Useful for dashboards, modals.</p>","mid"),
t("What are Intercepting Routes?","<p>Load a route within the current layout context. Used for modal patterns where clicking a link shows a modal but direct URL shows full page.</p><pre><code>// app/@modal/(.)photo/[id]/page.js - intercepts /photo/[id]\n// app/photo/[id]/page.js - direct navigation</code></pre>","mid"),
t("What is <code>generateStaticParams</code>?","<p>App Router equivalent of <code>getStaticPaths</code>:</p><pre><code>export async function generateStaticParams() {\n  const posts = await getPosts();\n  return posts.map(p =&gt; ({ slug: p.slug }));\n}</code></pre>","mid"),
t("What is <code>generateMetadata</code>?","<pre><code>export async function generateMetadata({ params }) {\n  const post = await getPost(params.slug);\n  return {\n    title: post.title,\n    description: post.excerpt,\n    openGraph: { images: [post.image] }\n  };\n}</code></pre><p>Dynamic metadata based on route params.</p>","mid"),
t("What are Route Handlers?","<p>App Router API endpoints in <code>route.js</code> files. Support streaming, Web APIs (Request/Response), can be edge or Node runtime.</p><pre><code>export async function GET(request) {\n  const { searchParams } = new URL(request.url);\n  const page = searchParams.get('page');\n  return Response.json(await getItems(page));\n}</code></pre>","mid"),
t("What is <code>not-found.js</code>?","<p>Custom 404 page per route segment:</p><pre><code>// Trigger manually:\nimport { notFound } from 'next/navigation';\nif (!post) notFound();\n\n// app/not-found.js\nexport default function NotFound() {\n  return &lt;h1&gt;Page not found&lt;/h1&gt;;\n}</code></pre>","mid"),
t("How to handle forms in Next.js App Router?","<p>Use Server Actions with <code>&lt;form action={serverAction}&gt;</code>. Progressive enhancement works without JS. Use <code>useFormStatus</code> for pending state and <code>useFormState</code> for validation errors.</p>","mid"),
c("Implement a search with URL params","<pre><code>'use client';\nimport { useRouter, useSearchParams } from 'next/navigation';\n\nfunction Search() {\n  const router = useRouter();\n  const searchParams = useSearchParams();\n  const q = searchParams.get('q') || '';\n  \n  function handleSearch(term) {\n    const params = new URLSearchParams(searchParams);\n    if (term) params.set('q', term);\n    else params.delete('q');\n    router.replace(`?${params.toString()}`);\n  }\n  \n  return &lt;input defaultValue={q} onChange={e =&gt; handleSearch(e.target.value)} /&gt;;\n}</code></pre>","mid"),
c("Create a data table with Server Components","<pre><code>// app/users/page.js (Server Component)\nasync function UsersPage({ searchParams }) {\n  const page = Number(searchParams.page) || 1;\n  const users = await db.users.findMany({\n    skip: (page - 1) * 20, take: 20\n  });\n  return (\n    &lt;table&gt;\n      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Name&lt;/th&gt;&lt;th&gt;Email&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;\n      &lt;tbody&gt;{users.map(u =&gt;\n        &lt;tr key={u.id}&gt;&lt;td&gt;{u.name}&lt;/td&gt;&lt;td&gt;{u.email}&lt;/td&gt;&lt;/tr&gt;\n      )}&lt;/tbody&gt;\n    &lt;/table&gt;\n  );\n}</code></pre>","mid"),

// SENIOR (8)
c("Implement auth in App Router","<pre><code>// middleware.js\nimport { NextResponse } from 'next/server';\nexport function middleware(req) {\n  const token = req.cookies.get('session')?.value;\n  if (!token && !req.nextUrl.pathname.startsWith('/auth'))\n    return NextResponse.redirect(new URL('/auth/login', req.url));\n  return NextResponse.next();\n}\nexport const config = { matcher: ['/dashboard/:path*', '/auth/:path*'] };</code></pre>","senior"),
t("Explain Middleware and Edge Runtime","<p>Middleware runs before every request at the edge (~0ms cold start). Limited to Web APIs (no Node fs, etc). Use for auth, redirects, A/B testing, geo-routing, rate limiting. Max 1MB bundle.</p>","senior"),
t("How to implement i18n in Next.js?","<p>App Router: use <code>[locale]</code> segment + middleware for detection. Libraries: next-intl, next-i18next. Store translations as JSON. Generate static params for each locale. Handle alternate hreflang meta tags.</p>","senior"),
t("How to optimize Next.js build performance?","<ul><li>Use <code>turbopack</code> for dev</li><li>Minimize client components</li><li>Use dynamic imports with <code>ssr: false</code></li><li>Optimize images (sizes prop)</li><li>Parallel data fetching</li><li>Edge runtime where possible</li><li>Analyze bundle with <code>@next/bundle-analyzer</code></li></ul>","senior"),
t("What is Partial Prerendering (PPR)?","<p>Experimental feature that combines static shell (instant) with dynamic holes (streamed). The static HTML is served from CDN immediately, while dynamic parts load via streaming SSR. Best of both SSG and SSR.</p>","senior"),
t("How to implement rate limiting?","<pre><code>// middleware.js with in-memory store (use Redis in production)\nconst rateLimit = new Map();\nexport function middleware(req) {\n  const ip = req.headers.get('x-forwarded-for') || 'unknown';\n  const now = Date.now();\n  const window = rateLimit.get(ip) || { count: 0, start: now };\n  if (now - window.start &gt; 60000) { window.count = 0; window.start = now; }\n  window.count++;\n  rateLimit.set(ip, window);\n  if (window.count &gt; 100) return new Response('Too Many Requests', { status: 429 });\n}</code></pre>","senior"),
t("What are streaming and React Suspense in Next.js?","<p>Next.js streams HTML progressively using React Suspense boundaries. The shell loads instantly, then each Suspense boundary resolves and streams its content. Combined with <code>loading.js</code> for automatic Suspense boundaries per route segment.</p>","senior"),
c("Implement optimistic updates with Server Actions","<pre><code>'use client';\nimport { useOptimistic } from 'react';\nimport { addTodo } from './actions';\n\nfunction TodoList({ todos }) {\n  const [optimisticTodos, addOptimistic] = useOptimistic(\n    todos,\n    (state, newTodo) =&gt; [...state, { ...newTodo, pending: true }]\n  );\n  \n  async function handleSubmit(formData) {\n    const title = formData.get('title');\n    addOptimistic({ title, id: Date.now() });\n    await addTodo(formData);\n  }\n  \n  return (&lt;&gt;\n    &lt;form action={handleSubmit}&gt;&lt;input name=\"title\" /&gt;&lt;/form&gt;\n    {optimisticTodos.map(t =&gt; &lt;p key={t.id} style={{opacity: t.pending ? 0.5 : 1}}&gt;{t.title}&lt;/p&gt;)}\n  &lt;/&gt;);\n}</code></pre>","senior"),

// EXPERT (5)
t("Design multi-tenant SaaS with Next.js","<p>Subdomain routing via middleware rewrite. Tenant context in layout. Database: row-level security or schema-per-tenant. Tenant-aware caching. Custom domains: wildcard SSL + verification. Per-tenant rate limiting.</p>","expert"),
t("Design global-scale Next.js deployment","<p>Edge middleware for auth/geo. CDN for static assets. Regional origin servers. Database read replicas per region. Streaming SSR with Suspense. Redis for sessions. OpenTelemetry for observability. Canary deploys.</p>","architect"),
t("How to implement real-time features in Next.js?","<p>Options: WebSocket server (separate or custom server), Server-Sent Events via Route Handlers, Pusher/Ably for managed pubsub, polling with SWR/React Query. For App Router: use client components for subscriptions, server components for initial data.</p>","expert"),
t("Explain Next.js internal architecture","<p>Turbopack/Webpack bundler, SWC compiler (Rust), Node.js + Edge runtimes. Route manifest generated at build. Request flow: Edge middleware &rarr; static match or serverless function &rarr; React Server Components render &rarr; HTML stream &rarr; client hydration.</p>","expert"),
c("Build a file upload with progress","<pre><code>'use client';\nfunction Upload() {\n  const [progress, setProgress] = useState(0);\n  async function handleUpload(e) {\n    const file = e.target.files[0];\n    const formData = new FormData();\n    formData.append('file', file);\n    const xhr = new XMLHttpRequest();\n    xhr.upload.onprogress = (e) =&gt; setProgress(Math.round(e.loaded/e.total*100));\n    xhr.onload = () =&gt; console.log('Done');\n    xhr.open('POST', '/api/upload');\n    xhr.send(formData);\n  }\n  return (&lt;&gt;\n    &lt;input type=\"file\" onChange={handleUpload} /&gt;\n    &lt;div style={{width:`${progress}%`,height:4,background:'#4caf50'}} /&gt;\n  &lt;/&gt;);\n}</code></pre>","expert"),
]},

typescript: { icon:"\uD83D\uDD37", name:"TypeScript", questions:[
// ENTRY (8)
t("What is TypeScript?","<p>A typed superset of JavaScript that compiles to plain JS. Adds static type checking, better IDE support, and self-documenting code.</p>","entry"),
t("Basic types?","<pre><code>let name: string = 'Alice';\nlet age: number = 30;\nlet active: boolean = true;\nlet nums: number[] = [1, 2, 3];\nlet pair: [string, number] = ['age', 30];\nenum Status { Active, Inactive }\nlet anything: any; let safe: unknown;\nfunction fail(): never { throw new Error(); }</code></pre>","entry"),
t("What is type inference?","<p>TypeScript automatically infers types from values:</p><pre><code>let x = 10;        // inferred as number\nlet s = 'hello';    // inferred as string\nconst arr = [1, 2]; // inferred as number[]\n// No need to annotate when type is obvious</code></pre>","entry"),
t("What are union types?","<pre><code>let id: string | number = 'abc';\nid = 123; // also valid\n\nfunction print(val: string | number) {\n  if (typeof val === 'string') val.toUpperCase(); // narrowed\n}</code></pre>","entry"),
t("What is the <code>as</code> keyword?","<p>Type assertion &mdash; tells TypeScript to treat a value as a specific type:</p><pre><code>const input = document.getElementById('name') as HTMLInputElement;\ninput.value; // TypeScript knows it's an input</code></pre><p>Use sparingly &mdash; prefer type guards.</p>","entry"),
t("What are type annotations?","<pre><code>// Variables\nlet name: string;\n\n// Functions\nfunction add(a: number, b: number): number { return a + b; }\n\n// Objects\nlet user: { name: string; age: number } = { name: 'Alice', age: 30 };</code></pre>","entry"),
t("What is <code>void</code> vs <code>undefined</code>?","<p><code>void</code>: function doesn't return a value (can return undefined implicitly). <code>undefined</code>: an actual value. <code>void</code> is typically used as function return type only.</p>","entry"),
t("What is a type alias?","<pre><code>type Point = { x: number; y: number };\ntype ID = string | number;\ntype Handler = (event: Event) =&gt; void;\ntype Status = 'active' | 'inactive' | 'pending';</code></pre>","entry"),

// JUNIOR (10)
t("<code>interface</code> vs <code>type</code>?","<p><code>interface</code>: extendable, mergeable, best for object shapes. <code>type</code>: unions, tuples, mapped types, more flexible. Use interface for public APIs, type for everything else.</p>","junior"),
t("What are Generics?","<pre><code>function identity&lt;T&gt;(arg: T): T { return arg; }\nidentity&lt;string&gt;('hi');\nidentity(42); // inferred\n\ninterface ApiResponse&lt;T&gt; { data: T; status: number; }\nconst res: ApiResponse&lt;User[]&gt; = { data: users, status: 200 };</code></pre>","junior"),
t("What are type guards?","<pre><code>// typeof\nif (typeof x === 'string') { /* x is string */ }\n\n// instanceof\nif (err instanceof Error) { /* err is Error */ }\n\n// Custom type guard\nfunction isUser(obj: any): obj is User {\n  return obj && typeof obj.name === 'string';\n}\nif (isUser(data)) { /* data is User */ }</code></pre>","junior"),
t("What is <code>keyof</code>?","<pre><code>interface User { name: string; age: number; email: string; }\ntype UserKeys = keyof User; // 'name' | 'age' | 'email'\n\nfunction getProperty&lt;T, K extends keyof T&gt;(obj: T, key: K): T[K] {\n  return obj[key];\n}</code></pre>","junior"),
t("What are optional and readonly properties?","<pre><code>interface User {\n  readonly id: number;    // can't reassign\n  name: string;\n  email?: string;         // optional\n}\n\nconst user: User = { id: 1, name: 'Alice' };\n// user.id = 2; // Error!</code></pre>","junior"),
t("What is the <code>never</code> type?","<p>Represents values that never occur: functions that always throw, infinite loops, exhaustive checks:</p><pre><code>function assertNever(x: never): never {\n  throw new Error('Unexpected: ' + x);\n}\nswitch (shape.type) {\n  case 'circle': /*...*/; break;\n  case 'square': /*...*/; break;\n  default: assertNever(shape); // Error if unhandled case\n}</code></pre>","junior"),
t("What are index signatures?","<pre><code>interface StringMap {\n  [key: string]: number;\n}\nconst ages: StringMap = { alice: 30, bob: 25 };\n\ninterface Row {\n  id: number;\n  [key: string]: unknown;\n}</code></pre>","junior"),
t("What is <code>typeof</code> in TypeScript?","<pre><code>const config = { api: '/api', timeout: 5000 };\ntype Config = typeof config; // { api: string; timeout: number }\n\nfunction create(cfg: typeof config) { /*...*/ }</code></pre><p>Extracts the type from a value.</p>","junior"),
t("What is the <code>satisfies</code> operator?","<pre><code>type Colors = Record&lt;string, string | number[]&gt;;\nconst palette = {\n  red: '#ff0000',\n  green: [0, 255, 0]\n} satisfies Colors;\n\npalette.red.toUpperCase(); // Works! Type is narrowed to string\n// Without satisfies, red would be string | number[]</code></pre>","junior"),
t("What are enums and const enums?","<pre><code>// Regular enum (generates runtime object)\nenum Direction { Up, Down, Left, Right }\n\n// String enum\nenum Status { Active = 'ACTIVE', Inactive = 'INACTIVE' }\n\n// Const enum (inlined at compile time, no runtime object)\nconst enum Color { Red, Green, Blue }\nlet c = Color.Red; // Compiles to: let c = 0;</code></pre>","junior"),

// MID (12)
t("Utility types?","<p><code>Partial&lt;T&gt;</code>, <code>Required&lt;T&gt;</code>, <code>Pick&lt;T,K&gt;</code>, <code>Omit&lt;T,K&gt;</code>, <code>Record&lt;K,V&gt;</code>, <code>Readonly&lt;T&gt;</code>, <code>Extract</code>, <code>Exclude</code>, <code>ReturnType</code>, <code>Parameters</code>, <code>Awaited</code>, <code>NonNullable</code>.</p>","mid"),
t("Conditional types?","<pre><code>type IsString&lt;T&gt; = T extends string ? true : false;\ntype UnwrapPromise&lt;T&gt; = T extends Promise&lt;infer U&gt; ? U : T;\ntype Data = UnwrapPromise&lt;Promise&lt;string&gt;&gt;; // string</code></pre>","mid"),
t("What are mapped types?","<pre><code>type Readonly&lt;T&gt; = { readonly [K in keyof T]: T[K] };\ntype Optional&lt;T&gt; = { [K in keyof T]?: T[K] };\ntype Getters&lt;T&gt; = { [K in keyof T as `get${Capitalize&lt;string & K&gt;}`]: () =&gt; T[K] };</code></pre>","mid"),
t("What is the <code>infer</code> keyword?","<p>Used in conditional types to extract/infer a type:</p><pre><code>type ReturnType&lt;T&gt; = T extends (...args: any[]) =&gt; infer R ? R : never;\ntype ElementType&lt;T&gt; = T extends (infer U)[] ? U : T;\ntype PropType&lt;T, K&gt; = K extends keyof T ? T[K] : never;</code></pre>","mid"),
t("Template literal types?","<pre><code>type Event = `on${Capitalize&lt;'click' | 'focus' | 'blur'&gt;}`;\n// 'onClick' | 'onFocus' | 'onBlur'\n\ntype Route = `/${string}`;\ntype APIRoute = `/api/${string}`;</code></pre>","mid"),
t("What are discriminated unions?","<pre><code>type Shape = \n  | { kind: 'circle'; radius: number }\n  | { kind: 'rect'; width: number; height: number };\n\nfunction area(s: Shape): number {\n  switch (s.kind) {\n    case 'circle': return Math.PI * s.radius ** 2;\n    case 'rect': return s.width * s.height;\n  }\n}</code></pre><p>A common field (discriminant) enables exhaustive type narrowing.</p>","mid"),
t("What is declaration merging?","<pre><code>// Interfaces merge automatically\ninterface Window { myGlobal: string; }\n// Now window.myGlobal is typed\n\n// Module augmentation\ndeclare module 'express' {\n  interface Request { userId: string; }\n}</code></pre>","mid"),
t("What is <code>unknown</code> vs <code>any</code>?","<p><code>any</code>: disables type checking entirely. <code>unknown</code>: type-safe alternative &mdash; must narrow before use.</p><pre><code>let x: unknown = 'hello';\n// x.toUpperCase(); // Error!\nif (typeof x === 'string') x.toUpperCase(); // OK</code></pre>","mid"),
c("Type a React component with TypeScript","<pre><code>interface ButtonProps {\n  variant: 'primary' | 'secondary';\n  size?: 'sm' | 'md' | 'lg';\n  onClick: (e: React.MouseEvent) =&gt; void;\n  children: React.ReactNode;\n  disabled?: boolean;\n}\n\nconst Button: React.FC&lt;ButtonProps&gt; = ({ variant, size = 'md', children, ...rest }) =&gt; (\n  &lt;button className={`btn btn-${variant} btn-${size}`} {...rest}&gt;{children}&lt;/button&gt;\n);</code></pre>","mid"),
c("Type a custom hook","<pre><code>interface UseFetchResult&lt;T&gt; {\n  data: T | null;\n  loading: boolean;\n  error: Error | null;\n}\n\nfunction useFetch&lt;T&gt;(url: string): UseFetchResult&lt;T&gt; {\n  const [data, setData] = useState&lt;T | null&gt;(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState&lt;Error | null&gt;(null);\n  // ... fetch logic\n  return { data, loading, error };\n}\n\nconst { data } = useFetch&lt;User[]&gt;('/api/users');\n// data is User[] | null</code></pre>","mid"),
t("What is <code>const</code> assertion?","<pre><code>const routes = ['/', '/about', '/contact'] as const;\n// Type: readonly ['/', '/about', '/contact']\n\ntype Route = typeof routes[number]; // '/' | '/about' | '/contact'\n\nconst config = { api: '/api', timeout: 5000 } as const;\n// All properties are readonly and literal types</code></pre>","mid"),
t("What are function overloads?","<pre><code>function createElement(tag: 'input'): HTMLInputElement;\nfunction createElement(tag: 'div'): HTMLDivElement;\nfunction createElement(tag: string): HTMLElement;\nfunction createElement(tag: string): HTMLElement {\n  return document.createElement(tag);\n}\n\nconst input = createElement('input'); // HTMLInputElement</code></pre>","mid"),

// SENIOR (8)
t("Structural vs nominal typing?","<p>TypeScript is structural (duck typing). Simulate nominal with branded types:</p><pre><code>type USD = number & { readonly __brand: unique symbol };\ntype EUR = number & { readonly __brand: unique symbol };\nfunction usd(n: number): USD { return n as USD; }\n// processPayment(eur(100)); // Error!</code></pre>","senior"),
c("Build a type-safe event emitter","<pre><code>class Emitter&lt;T extends Record&lt;string, any&gt;&gt; {\n  private listeners: { [K in keyof T]?: Array&lt;(p: T[K])=&gt;void&gt; } = {};\n  on&lt;K extends keyof T&gt;(e: K, fn: (p: T[K])=&gt;void) {\n    (this.listeners[e] ??= []).push(fn);\n    return () =&gt; this.off(e, fn);\n  }\n  off&lt;K extends keyof T&gt;(e: K, fn: (p: T[K])=&gt;void) {\n    this.listeners[e] = this.listeners[e]?.filter(f =&gt; f !== fn);\n  }\n  emit&lt;K extends keyof T&gt;(e: K, p: T[K]) {\n    this.listeners[e]?.forEach(fn =&gt; fn(p));\n  }\n}\n// Fully typed: emitter.emit('login', { userId: '1' });</code></pre>","senior"),
t("What are higher-kinded types workarounds?","<p>TypeScript doesn't natively support HKTs. Workarounds: using interfaces with generics, 'defunctionalized' type-level functions, or libraries like fp-ts that simulate HKTs through a URI-based encoding pattern.</p>","senior"),
c("Implement a type-safe form builder","<pre><code>type FieldConfig&lt;T&gt; = {\n  [K in keyof T]: {\n    label: string;\n    validate?: (value: T[K]) =&gt; string | null;\n    defaultValue: T[K];\n  };\n};\n\nfunction createForm&lt;T extends Record&lt;string, any&gt;&gt;(config: FieldConfig&lt;T&gt;) {\n  const values = {} as T;\n  for (const key in config) values[key] = config[key].defaultValue;\n  return {\n    values,\n    validate(): Record&lt;keyof T, string | null&gt; {\n      const errors = {} as Record&lt;keyof T, string | null&gt;;\n      for (const key in config) {\n        errors[key] = config[key].validate?.(values[key]) ?? null;\n      }\n      return errors;\n    }\n  };\n}</code></pre>","senior"),
c("Extract route params from path type","<pre><code>type ExtractParams&lt;T extends string&gt; =\n  T extends `${string}:${infer P}/${infer Rest}`\n    ? { [K in P | keyof ExtractParams&lt;Rest&gt;]: string }\n    : T extends `${string}:${infer P}`\n      ? { [K in P]: string }\n      : {};\n\ntype Params = ExtractParams&lt;'/users/:id/posts/:postId'&gt;;\n// { id: string; postId: string }</code></pre>","senior"),
t("What is variance in TypeScript?","<p><code>covariant</code>: subtype flows in same direction (return types). <code>contravariant</code>: flows opposite (parameter types). <code>invariant</code>: exact match. Use <code>in</code>/<code>out</code> modifiers (TS 4.7+):</p><pre><code>interface Producer&lt;out T&gt; { get(): T; }     // covariant\ninterface Consumer&lt;in T&gt; { accept(v: T): void; } // contravariant</code></pre>","senior"),
t("What are <code>NoInfer</code> and other intrinsic types?","<pre><code>// NoInfer prevents inference from a specific position\nfunction create&lt;T&gt;(defaults: T, overrides: NoInfer&lt;T&gt;) { /**/ }\n\n// Intrinsic string manipulation types\ntype Upper = Uppercase&lt;'hello'&gt;; // 'HELLO'\ntype Lower = Lowercase&lt;'HELLO'&gt;; // 'hello'\ntype Cap = Capitalize&lt;'hello'&gt;;   // 'Hello'\ntype Uncap = Uncapitalize&lt;'Hello'&gt;; // 'hello'</code></pre>","senior"),
c("Build a type-safe API client","<pre><code>type Routes = {\n  'GET /users': { response: User[]; query: { page?: number } };\n  'GET /users/:id': { response: User; params: { id: string } };\n  'POST /users': { response: User; body: CreateUserDto };\n};\n\nasync function api&lt;R extends keyof Routes&gt;(\n  route: R,\n  ...args: Routes[R] extends { body: infer B } ? [{ body: B }]\n    : Routes[R] extends { params: infer P } ? [{ params: P }]\n    : [{}?]\n): Promise&lt;Routes[R]['response']&gt; {\n  // Implementation: parse route, make fetch call\n  const [method, path] = (route as string).split(' ');\n  const res = await fetch(path, { method });\n  return res.json();\n}\n// api('GET /users'); // Returns Promise&lt;User[]&gt;</code></pre>","senior"),

// EXPERT (4)
c("Implement a type-safe state machine","<pre><code>type Machine&lt;States extends string, Events extends string&gt; = {\n  initial: States;\n  states: Record&lt;States, {\n    on?: Partial&lt;Record&lt;Events, States&gt;&gt;;\n  }&gt;;\n};\n\nfunction createMachine&lt;S extends string, E extends string&gt;(config: Machine&lt;S, E&gt;) {\n  let current = config.initial;\n  return {\n    get state() { return current; },\n    send(event: E) {\n      const next = config.states[current].on?.[event];\n      if (next) current = next;\n      return current;\n    }\n  };\n}\n\nconst toggle = createMachine({\n  initial: 'inactive' as const,\n  states: {\n    inactive: { on: { TOGGLE: 'active' } },\n    active: { on: { TOGGLE: 'inactive' } }\n  }\n});</code></pre>","expert"),
t("What are module augmentation patterns?","<pre><code>// Augment existing types\ndeclare module 'next' {\n  interface NextApiRequest { userId: string; }\n}\n\n// Global augmentation\ndeclare global {\n  interface Window { analytics: Analytics; }\n  namespace NodeJS {\n    interface ProcessEnv { DATABASE_URL: string; }\n  }\n}</code></pre>","expert"),
c("Implement a type-safe dependency injection container","<pre><code>type Token&lt;T&gt; = { __type: T; key: string };\nfunction token&lt;T&gt;(key: string): Token&lt;T&gt; { return { key } as any; }\n\nclass Container {\n  private deps = new Map&lt;string, any&gt;();\n  register&lt;T&gt;(token: Token&lt;T&gt;, factory: () =&gt; T) {\n    this.deps.set(token.key, factory);\n    return this;\n  }\n  resolve&lt;T&gt;(token: Token&lt;T&gt;): T {\n    const factory = this.deps.get(token.key);\n    if (!factory) throw new Error(`Not registered: ${token.key}`);\n    return factory();\n  }\n}\n\nconst DB = token&lt;Database&gt;('db');\nconst container = new Container().register(DB, () =&gt; new Database());\nconst db = container.resolve(DB); // typed as Database</code></pre>","expert"),
t("How does TypeScript's type checker work internally?","<p>The compiler has 5 phases: Scanner (tokens) &rarr; Parser (AST) &rarr; Binder (symbols + scopes) &rarr; Checker (types, ~50% of code) &rarr; Emitter (JS output). The checker resolves types through structural comparison, control flow analysis for narrowing, and constraint solving for generics.</p>","expert"),
]},

webFundamentals: { icon:"\uD83C\uDF10", name:"Web Fundamentals", questions:[
// ENTRY (8)
t("What is HTTP?","<p>Hypertext Transfer Protocol: request-response between client and server. Methods: GET, POST, PUT, PATCH, DELETE. Status codes: 2xx success, 3xx redirect, 4xx client error, 5xx server error.</p>","entry"),
t("localStorage vs sessionStorage vs cookies?","<p>localStorage: persistent, ~5MB, not sent to server. sessionStorage: per-tab, cleared on close. Cookies: ~4KB, sent with every request, can set expiry, HttpOnly, Secure, SameSite flags.</p>","entry"),
t("What is DNS?","<p>Domain Name System translates domain names to IP addresses. Browser checks cache &rarr; OS cache &rarr; router &rarr; ISP DNS &rarr; root servers. TTL determines cache duration.</p>","entry"),
t("What is HTTPS?","<p>HTTP over TLS/SSL. Provides encryption (data can't be read), authentication (server identity verified via certificates), and integrity (data can't be tampered). Uses port 443.</p>","entry"),
t("What are browser developer tools?","<p>Elements (DOM/CSS), Console (JS), Network (requests), Sources (debug), Performance (profiling), Memory (leaks), Application (storage/service workers), Lighthouse (audits).</p>","entry"),
t("What is a CDN?","<p>Content Delivery Network: distributed servers that cache and serve content from locations close to users. Reduces latency, handles traffic spikes, provides DDoS protection. Examples: Cloudflare, Vercel Edge, AWS CloudFront.</p>","entry"),
t("What is responsive design?","<p>Building websites that adapt to different screen sizes using fluid grids, flexible images, and media queries. Mobile-first approach: design for small screens first, then enhance for larger.</p>","entry"),
t("What is the difference between URL, URI, and URN?","<p><strong>URI</strong>: Uniform Resource Identifier (superset). <strong>URL</strong>: URI that specifies location (https://example.com/page). <strong>URN</strong>: URI that specifies name (urn:isbn:0451450523). All URLs are URIs, but not all URIs are URLs.</p>","entry"),

// JUNIOR (10)
t("What is CORS?","<p>Cross-Origin Resource Sharing: browser mechanism allowing requests to different domains. Simple requests skip preflight. Others send OPTIONS first. Server responds with <code>Access-Control-Allow-Origin</code> headers.</p>","junior"),
t("What is a REST API?","<p>Architectural style: stateless, resource-based URLs, HTTP methods for operations, JSON responses. RESTful: GET /users, POST /users, GET /users/123, PUT /users/123, DELETE /users/123.</p>","junior"),
t("What are Web Workers?","<p>Background threads for heavy computation. No DOM access, communicate via <code>postMessage</code>. Types: dedicated (one page), shared (multiple pages), service (network proxy).</p>","junior"),
t("What is GraphQL?","<p>Query language for APIs. Client specifies exact data needed (no over/under-fetching). Single endpoint. Typed schema. Queries, mutations, subscriptions.</p><pre><code>query { user(id: 1) { name posts { title } } }</code></pre>","junior"),
t("What is JWT?","<p>JSON Web Token: header.payload.signature. Stateless auth. Stored in httpOnly cookie or Authorization header. Contains claims (user ID, expiry). Verify with secret/public key.</p>","junior"),
t("What is XSS and how to prevent it?","<p>Cross-Site Scripting: injecting malicious scripts. Types: Stored, Reflected, DOM-based. Prevention: escape output, Content Security Policy, HttpOnly cookies, sanitize HTML input, use framework auto-escaping.</p>","junior"),
t("What is CSRF?","<p>Cross-Site Request Forgery: tricking user's browser into making unwanted requests. Prevention: CSRF tokens, SameSite cookies, checking Origin/Referer headers, requiring re-authentication for sensitive actions.</p>","junior"),
t("What is WebSocket?","<p>Full-duplex bidirectional communication over single TCP connection. Use for chat, gaming, live data. <code>ws://</code> or <code>wss://</code> (secure).</p><pre><code>const ws = new WebSocket('wss://api.example.com');\nws.onmessage = (e) =&gt; console.log(e.data);\nws.send('hello');</code></pre>","junior"),
t("What is OAuth 2.0?","<p>Authorization framework for third-party access. Flows: Authorization Code (web apps), PKCE (SPAs/mobile), Client Credentials (server-to-server). Issues access tokens + refresh tokens.</p>","junior"),
t("What are HTTP headers?","<p>Key categories: <strong>Request</strong>: Accept, Authorization, Cookie, User-Agent. <strong>Response</strong>: Content-Type, Set-Cookie, Cache-Control. <strong>Security</strong>: CSP, HSTS, X-Frame-Options. <strong>Caching</strong>: ETag, Last-Modified, Cache-Control.</p>","junior"),

// MID (12)
t("Critical Rendering Path?","<p>HTML &rarr; DOM, CSS &rarr; CSSOM, combine &rarr; Render Tree, Layout (geometry), Paint (pixels), Composite (layers). Optimize: inline critical CSS, defer non-critical, preload fonts, async scripts.</p>","mid"),
t("Core Web Vitals?","<p><strong>LCP</strong> (loading, &lt;2.5s): largest visible element. <strong>INP</strong> (responsiveness, &lt;200ms): all interaction latency. <strong>CLS</strong> (stability, &lt;0.1): unexpected layout shifts. Measure with web-vitals library or Lighthouse.</p>","mid"),
c("Service Worker for offline?","<pre><code>// sw.js\nconst CACHE = 'v1';\nself.addEventListener('install', e =&gt; e.waitUntil(\n  caches.open(CACHE).then(c =&gt; c.addAll(['/','/app.js','/style.css']))\n));\nself.addEventListener('fetch', e =&gt; e.respondWith(\n  caches.match(e.request).then(r =&gt; r || fetch(e.request))\n));</code></pre>","mid"),
t("What is HTTP/2 and HTTP/3?","<p><strong>HTTP/2</strong>: multiplexing (multiple requests on one connection), header compression, server push, binary protocol. <strong>HTTP/3</strong>: uses QUIC over UDP instead of TCP, faster connection setup, better on unreliable networks.</p>","mid"),
t("What is a Progressive Web App (PWA)?","<p>Web app with native-like features: offline (Service Worker), installable (manifest.json), push notifications, background sync. Must be HTTPS, have a manifest, and register a service worker.</p>","mid"),
t("What is Content Security Policy (CSP)?","<pre><code>Content-Security-Policy:\n  default-src 'self';\n  script-src 'self' 'nonce-abc123';\n  style-src 'self' 'unsafe-inline';\n  img-src 'self' data: https:;\n  connect-src 'self' https://api.example.com;</code></pre><p>Prevents XSS by whitelisting content sources.</p>","mid"),
t("What is server-side rendering vs client-side rendering?","<p><strong>SSR</strong>: server generates HTML, better SEO, faster FCP, more server load. <strong>CSR</strong>: browser renders via JS, better interactivity, less server load, worse SEO. <strong>SSG</strong>: pre-built at build time, best performance. Modern: mix approaches per page.</p>","mid"),
t("What is a reverse proxy?","<p>Server that sits in front of backend servers. Handles: load balancing, SSL termination, caching, compression, rate limiting, security. Examples: Nginx, Cloudflare, AWS ALB.</p>","mid"),
t("What are Web APIs you should know?","<ul><li>Fetch API / AbortController</li><li>IntersectionObserver (lazy loading)</li><li>MutationObserver (DOM changes)</li><li>ResizeObserver (element resize)</li><li>Clipboard API</li><li>Geolocation API</li><li>Web Animations API</li><li>Broadcast Channel (cross-tab)</li></ul>","mid"),
t("What is tree shaking?","<p>Dead code elimination for ES modules. Bundlers (webpack, Rollup, esbuild) analyze static imports and remove unused exports. Requires ES module syntax, <code>sideEffects: false</code> in package.json.</p>","mid"),
t("What are IndexedDB and Cache API?","<p><strong>IndexedDB</strong>: client-side NoSQL database for large structured data. Async, transactional. <strong>Cache API</strong>: request/response pair storage for offline support. Both have much higher storage limits than localStorage.</p>","mid"),
c("Implement a simple router","<pre><code>class Router {\n  #routes = new Map();\n  on(path, handler) { this.#routes.set(path, handler); return this; }\n  navigate(path) {\n    window.history.pushState({}, '', path);\n    this.#resolve(path);\n  }\n  #resolve(path) {\n    for (const [route, handler] of this.#routes) {\n      const match = path.match(new RegExp(`^${route.replace(/:([^/]+)/g, '(?&lt;$1&gt;[^/]+)')}$`));\n      if (match) { handler(match.groups || {}); return; }\n    }\n  }\n  listen() {\n    window.addEventListener('popstate', () =&gt; this.#resolve(location.pathname));\n    this.#resolve(location.pathname);\n  }\n}</code></pre>","mid"),

// SENIOR (8)
t("Browser garbage collection?","<p>V8: Generational GC. Young gen (Scavenger, semi-space copying, 1-2ms). Old gen (Mark-Compact, incremental marking, concurrent sweeping). Common leaks: event listeners, closures, detached DOM, growing collections.</p>","senior"),
t("WebSocket vs SSE?","<p><strong>WebSocket</strong>: bidirectional, binary/text, custom protocol. <strong>SSE</strong>: server-to-client only, auto-reconnect, text only, uses HTTP. Use WS for chat/gaming, SSE for notifications/feeds.</p>","senior"),
t("What is WASM (WebAssembly)?","<p>Binary instruction format that runs near-native speed in browsers. Compile from C/C++/Rust/Go. Use for: image processing, games, crypto, codecs. JS interop via imports/exports. Runs in same sandbox as JS.</p>","senior"),
t("What is the Permissions Policy (Feature Policy)?","<pre><code>Permissions-Policy: camera=(), microphone=(), geolocation=(self), fullscreen=(self \"https://embed.example.com\")</code></pre><p>Control which browser features can be used by the page and iframes.</p>","senior"),
t("How to debug performance issues?","<ol><li>Lighthouse audit for baseline</li><li>Performance panel: flame chart for long tasks</li><li>Network panel: waterfall for loading issues</li><li>Coverage tab: unused JS/CSS</li><li>Memory panel: heap snapshots for leaks</li><li>Web Vitals extension for real-time metrics</li><li>Chrome Trace for deep analysis</li></ol>","senior"),
t("What is Edge Computing?","<p>Running code at CDN edge locations close to users. Near-zero cold start. Limited runtime (Web APIs only). Use for: auth, personalization, A/B testing, geo-routing. Providers: Cloudflare Workers, Vercel Edge, Deno Deploy.</p>","senior"),
t("Explain browser caching strategies","<p><code>Cache-Control: max-age=31536000, immutable</code> for hashed assets. <code>Cache-Control: no-cache</code> + ETag for dynamic content. <code>stale-while-revalidate</code> for background refresh. Service Worker for offline. CDN cache for global distribution.</p>","senior"),
c("Implement a request queue with concurrency limit","<pre><code>class RequestQueue {\n  #queue = [];\n  #running = 0;\n  #concurrency;\n  constructor(concurrency = 3) { this.#concurrency = concurrency; }\n  add(fn) {\n    return new Promise((resolve, reject) =&gt; {\n      this.#queue.push({ fn, resolve, reject });\n      this.#process();\n    });\n  }\n  async #process() {\n    while (this.#running &lt; this.#concurrency && this.#queue.length) {\n      const { fn, resolve, reject } = this.#queue.shift();\n      this.#running++;\n      try { resolve(await fn()); }\n      catch (e) { reject(e); }\n      finally { this.#running--; this.#process(); }\n    }\n  }\n}</code></pre>","senior"),

// EXPERT (4)
t("Design a real-time collaboration system","<p>Use CRDTs for conflict-free merging. WebSocket for transport. Operational transform as alternative. Awareness protocol for presence. Offline queue with sync on reconnect. Vector clocks for ordering. Selective sync for large documents.</p>","expert"),
t("Design a frontend monitoring system","<p>Collect: errors (window.onerror, unhandledrejection), performance (PerformanceObserver, Web Vitals), user interactions (click, navigation). Transport: beacon API for reliable delivery. Backend: aggregate, alert, dashboards. Source maps for stack traces. Session replay for reproduction.</p>","expert"),
t("How does TLS handshake work?","<p>TLS 1.3: Client Hello (supported ciphers, key share) &rarr; Server Hello (chosen cipher, key share, certificate) &rarr; Client verifies cert, both derive session keys &rarr; Encrypted communication. 1-RTT handshake (0-RTT for resumption). AEAD ciphers only.</p>","expert"),
t("What is the Web Crypto API?","<pre><code>// Generate key pair\nconst keyPair = await crypto.subtle.generateKey(\n  { name: 'RSA-OAEP', modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: 'SHA-256' },\n  true, ['encrypt', 'decrypt']\n);\n// Hash\nconst hash = await crypto.subtle.digest('SHA-256', data);\n// Encrypt/decrypt, sign/verify also available</code></pre>","expert"),
]}
};

// ===================== APP LOGIC =====================
let activeTopic = 'all';
let activeLevels = new Set(['entry','junior','mid','senior','expert','architect']);
let completedQuestions = JSON.parse(localStorage.getItem('dp_completed') || '{}');
let searchQuery = '';
let codeOnly = false;
let hideCompleted = false;

function getAllQuestions() {
  const all = [];
  let globalIdx = 1;
  for (const [topicKey, topic] of Object.entries(DATA)) {
    for (const q of topic.questions) {
      all.push({ ...q, topic: topicKey, topicName: topic.name, icon: topic.icon, globalIdx: globalIdx++ });
    }
  }
  return all;
}

function getFilteredQuestions() {
  let qs = getAllQuestions();
  if (activeTopic !== 'all') qs = qs.filter(q => q.topic === activeTopic);
  qs = qs.filter(q => activeLevels.has(q.level));
  if (searchQuery) {
    const s = searchQuery.toLowerCase();
    qs = qs.filter(q => q.q.toLowerCase().includes(s));
  }
  if (codeOnly) qs = qs.filter(q => q.type === 'code');
  if (hideCompleted) qs = qs.filter(q => !completedQuestions[q.topic + '_' + q.q]);
  return qs;
}

function renderNav() {
  const nav = document.getElementById('topicNav');
  const allCount = getAllQuestions().length;
  let html = `<button class="nav-btn ${activeTopic==='all'?'active':''}" data-topic="all">All <span class="count">${allCount}</span></button>`;
  for (const [key, topic] of Object.entries(DATA)) {
    html += `<button class="nav-btn ${activeTopic===key?'active':''}" data-topic="${key}">${topic.icon} ${topic.name} <span class="count">${topic.questions.length}</span></button>`;
  }
  nav.innerHTML = html;
  document.getElementById('totalCount').textContent = allCount + ' Interview Questions';
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  const filtered = getFilteredQuestions();
  const groups = {};
  for (const q of filtered) {
    if (!groups[q.topic]) groups[q.topic] = { name: q.topicName, icon: q.icon, questions: [] };
    groups[q.topic].questions.push(q);
  }
  let html = '';
  let visibleIdx = 1;
  for (const [topicKey, group] of Object.entries(groups)) {
    html += `<div class="topic-section"><div class="topic-header"><span class="icon">${group.icon}</span> ${group.name} <span class="topic-count">(${group.questions.length} questions)</span></div>`;
    for (const q of group.questions) {
      const qid = q.topic + '_' + q.q;
      const isCompleted = completedQuestions[qid];
      html += `<div class="q-card ${isCompleted?'completed':''}" data-qid="${encodeURIComponent(qid)}">
        <div class="q-header">
          <span class="q-number">Q${visibleIdx}.</span>
          <span class="q-title">${q.q}</span>
          <div class="q-badges">
            ${q.type==='code'?'<span class="q-type">Code</span>':''}
            <span class="q-level ${q.level}">${q.level}</span>
          </div>
          <div class="q-check ${isCompleted?'checked':''}" title="Mark as done"></div>
          <span class="q-chevron">&#9660;</span>
        </div>
        <div class="q-answer">${q.a}</div>
      </div>`;
      visibleIdx++;
    }
    html += '</div>';
  }
  if (!filtered.length) html = '<p style="text-align:center;padding:40px;color:var(--text-light)">No questions match your filters.</p>';
  container.innerHTML = html;
  document.getElementById('resultCount').textContent = `${filtered.length} questions`;
  updateProgress();
}

function updateProgress() {
  const filtered = getFilteredQuestions();
  const total = filtered.length;
  const done = filtered.filter(q => completedQuestions[q.topic + '_' + q.q]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Progress: ${done}/${total} (${pct}%)`;
}

document.getElementById('questionsContainer').addEventListener('click', (e) => {
  const check = e.target.closest('.q-check');
  if (check) {
    e.stopPropagation();
    const card = check.closest('.q-card');
    const qid = decodeURIComponent(card.dataset.qid);
    if (completedQuestions[qid]) { delete completedQuestions[qid]; check.classList.remove('checked'); card.classList.remove('completed'); }
    else { completedQuestions[qid] = true; check.classList.add('checked'); card.classList.add('completed'); }
    localStorage.setItem('dp_completed', JSON.stringify(completedQuestions));
    updateProgress();
    return;
  }
  const header = e.target.closest('.q-header');
  if (header) header.closest('.q-card').classList.toggle('open');
});

document.getElementById('topicNav').addEventListener('click', (e) => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  activeTopic = btn.dataset.topic;
  renderNav();
  renderQuestions();
});

document.getElementById('levelFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.level-btn');
  if (!btn) return;
  const level = btn.dataset.level;
  if (activeLevels.has(level)) { activeLevels.delete(level); btn.classList.remove('active'); }
  else { activeLevels.add(level); btn.classList.add('active'); }
  renderQuestions();
});

document.getElementById('searchBox').addEventListener('input', (e) => { searchQuery = e.target.value; renderQuestions(); });
document.getElementById('codeOnly').addEventListener('change', (e) => { codeOnly = e.target.checked; renderQuestions(); });
document.getElementById('hideCompleted').addEventListener('change', (e) => { hideCompleted = e.target.checked; renderQuestions(); });
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('themeToggle');
  btn.textContent = document.body.classList.contains('dark') ? '\u2600' : '\u263E';
  localStorage.setItem('dp_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});

if (localStorage.getItem('dp_theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('themeToggle').textContent = '\u2600';
}
renderNav();
renderQuestions();
</script>
</body>
</html>
