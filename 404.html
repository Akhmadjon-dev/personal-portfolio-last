<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Ahmadjon Abdusamadov</title>
    <link rel="icon" href="/images/logo/8.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8ZL8G9NJH8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-8ZL8G9NJH8');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #e94560, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .home-link {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #e94560, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .home-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .lang-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lang-toggle:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 id="title">Page Not Found</h1>
        <p id="desc">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="home-link" id="homeLink">Back to Portfolio</a>
    </div>
    <button class="lang-toggle" id="langToggle">EN</button>
    <script>
        const i18n = {
            en: { title: 'Page Not Found', desc: "The page you're looking for doesn't exist or has been moved.", link: 'Back to Portfolio' },
            uz: { title: 'Sahifa topilmadi', desc: "Siz qidirayotgan sahifa mavjud emas yoki ko'chirilgan.", link: 'Portfolioga qaytish' }
        };
        let lang = localStorage.getItem('site_lang') || 'en';
        function applyLang(l) {
            lang = l;
            document.getElementById('title').textContent = i18n[l].title;
            document.getElementById('desc').textContent = i18n[l].desc;
            document.getElementById('homeLink').textContent = i18n[l].link;
            document.getElementById('langToggle').textContent = l.toUpperCase();
            localStorage.setItem('site_lang', l);
        }
        document.getElementById('langToggle').addEventListener('click', () => applyLang(lang === 'en' ? 'uz' : 'en'));
        if (lang !== 'en') applyLang(lang);
    </script>
</body>
</html>
